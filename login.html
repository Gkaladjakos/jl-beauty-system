<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JL Beauty — Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Animation fade-in de la carte */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0);    }
        }
        .fade-in-up { animation: fadeInUp .4s ease both; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-50 via-pink-50 to-white
             flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 fade-in-up">

        <!-- ── Logo / Titre ── -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center
                        justify-center mx-auto mb-4">
                <i class="fas fa-spa text-2xl text-purple-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">JL Beauty</h1>
            <p class="text-gray-500 text-sm mt-1">Connectez-vous à votre espace</p>
        </div>

        <!-- ── Message d'erreur ── -->
        <div id="login-error"
             class="hidden mb-4 bg-red-50 border border-red-200 rounded-lg
                    p-3 text-sm text-red-700 flex items-start gap-2">
            <i class="fas fa-exclamation-circle mt-0.5 flex-shrink-0"></i>
            <span id="login-error-msg"></span>
        </div>

        <!-- ── Formulaire ── -->
        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Email
                </label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-3 top-3
                               text-gray-400 text-sm"></i>
                    <input type="email" id="login-email" required
                           class="w-full pl-10 pr-4 py-2.5 border border-gray-300
                                  rounded-lg text-sm focus:ring-2
                                  focus:ring-purple-500 focus:border-transparent
                                  transition-shadow"
                           placeholder="votre@email.com"
                           autocomplete="email">
                </div>
            </div>

            <!-- Mot de passe -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Mot de passe
                </label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-3
                               text-gray-400 text-sm"></i>
                    <input type="password" id="login-password" required
                           class="w-full pl-10 pr-10 py-2.5 border border-gray-300
                                  rounded-lg text-sm focus:ring-2
                                  focus:ring-purple-500 focus:border-transparent
                                  transition-shadow"
                           placeholder="••••••••"
                           autocomplete="current-password">
                    <button type="button"
                            onclick="togglePasswordVisibility()"
                            class="absolute right-3 top-2.5 text-gray-400
                                   hover:text-gray-600 transition-colors">
                        <i id="pwd-eye-icon" class="fas fa-eye text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- Bouton connexion -->
            <button type="submit" id="login-btn"
                    class="w-full py-3 bg-purple-600 text-white rounded-lg
                           font-medium hover:bg-purple-700 active:bg-purple-800
                           transition-colors focus:ring-2 focus:ring-purple-500
                           focus:ring-offset-2 disabled:opacity-50
                           disabled:cursor-not-allowed">
                <span id="login-btn-text">
                    <i class="fas fa-sign-in-alt mr-2"></i>Se connecter
                </span>
                <span id="login-btn-loading" class="hidden">
                    <i class="fas fa-spinner fa-spin mr-2"></i>Connexion en cours…
                </span>
            </button>

        </form>

        <!-- ── Footer ── -->
        <p class="text-center text-xs text-gray-400 mt-8">
            JL Beauty Management System © 2025
        </p>
    </div>

    <!-- ══ Scripts ══ -->
    <!-- 1. Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 2. Config (SUPABASE_URL + SUPABASE_ANON_KEY) -->
    <script src="js/supabase-config.js"></script>
    <!-- 3. Module auth -->
    <script src="js/auth-supabase.js"></script>
    <script src="js/auth-manager.js"></script>

    <script>
        // ── Redirection automatique si déjà connecté ──────────────────────
        (async () => {
            try {
                const user = await AuthSupabase.checkAuth();
                if (user) {
                    console.log('✅ Session active → redirection index.html');
                    window.location.href = 'index.html';
                }
            } catch (e) {
                console.warn('checkAuth at startup failed:', e.message);
            }
        })();

        // ── Helpers UI ────────────────────────────────────────────────────
        function showError(msg) {
            document.getElementById('login-error-msg').textContent = msg;
            document.getElementById('login-error').classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('login-error').classList.add('hidden');
        }

        function setLoading(on) {
            const btn    = document.getElementById('login-btn');
            const txtEl  = document.getElementById('login-btn-text');
            const loadEl = document.getElementById('login-btn-loading');
            btn.disabled = on;
            txtEl .classList.toggle('hidden',  on);
            loadEl.classList.toggle('hidden', !on);
        }

        function togglePasswordVisibility() {
            const input = document.getElementById('login-password');
            const icon  = document.getElementById('pwd-eye-icon');
            if (input.type === 'password') {
                input.type    = 'text';
                icon.className = 'fas fa-eye-slash text-sm';
            } else {
                input.type    = 'password';
                icon.className = 'fas fa-eye text-sm';
            }
        }

        // ── handleLogin() ─────────────────────────────────────────────────
        async function handleLogin(e) {
            e.preventDefault();
            hideError();

            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showError('Veuillez remplir tous les champs.');
                return;
            }

            setLoading(true);

            try {
                // ✅ AuthSupabase.login() gère le log automatiquement
                const result = await AuthSupabase.login(email, password);

                if (!result.success) {
                    showError(result.error || 'Erreur de connexion.');
                    setLoading(false);
                    return;
                }

                // ✅ Succès → redirection
                window.location.href = 'index.html';

            } catch (err) {
                showError(err.message || 'Erreur inattendue.');
                setLoading(false);
            }
        }

        // ── Effacer l'erreur dès que l'user retape ─────────────────────────
        ['login-email', 'login-password'].forEach(id => {
            document.getElementById(id)?.addEventListener('input', hideError);
        });
    </script>

</body>
</html>
