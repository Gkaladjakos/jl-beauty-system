<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - JL Beauty System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #E8B44C;
        }
        .input-focus:focus {
            border-color: #E8B44C;
            box-shadow: 0 0 0 3px rgba(232, 180, 76, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #E8B44C 0%, #D4A043 100%);
            color: #000;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #D4A043 0%, #C09039 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="login-card w-full max-w-md rounded-2xl shadow-2xl p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <img src="images/jl-beauty-logo.png" alt="JL Beauty" class="w-32 h-32 mx-auto mb-4">
            <h1 class="text-3xl font-bold" style="color: #E8B44C;">JL Beauty System</h1>
            <p class="text-gray-600 mt-2">Un univers à vivre</p>
        </div>

        <!-- Info Production -->
        <div class="mb-6 bg-green-50 border border-green-200 rounded-lg p-4">
            <p class="text-sm text-green-800">
                <i class="fas fa-shield-alt mr-2"></i>
                <strong>Mode Production</strong> - Connectez-vous avec vos identifiants Supabase
            </p>
        </div>

        <!-- Formulaire de Connexion -->
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-envelope mr-2"></i>Email
                </label>
                <input type="email" id="email" required
                       class="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg transition-all"
                       placeholder="admin@jlbeauty.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-2"></i>Mot de passe
                </label>
                <div class="relative">
                    <input type="password" id="password" required
                           class="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg transition-all pr-12"
                           placeholder="••••••••">
                    <button type="button" onclick="togglePassword()" 
                            class="absolute right-3 top-3 text-gray-500 hover:text-gray-700">
                        <i id="password-icon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Message d'erreur -->
            <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="error-text"></span>
            </div>

            <!-- Bouton de connexion -->
            <button type="submit" id="submit-btn"
                    class="btn-primary w-full py-3 rounded-lg font-semibold transition-all transform hover:scale-105 shadow-lg">
                <i class="fas fa-sign-in-alt mr-2"></i>Se connecter
            </button>
        </form>

        <!-- Loading Spinner -->
        <div id="loading" class="hidden text-center mt-4">
            <i class="fas fa-spinner fa-spin text-3xl" style="color: #E8B44C;"></i>
            <p class="text-gray-600 mt-2">Connexion en cours...</p>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center text-sm text-gray-600">
            <p>
                <i class="fas fa-info-circle mr-1"></i>
                Besoin d'aide ? Contactez votre administrateur
            </p>
            <p class="mt-2 text-xs text-gray-500">
                JL Beauty System v2.2 © 2026
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth-supabase.js"></script>
    
    <script>
        console.log('='.repeat(60));
        console.log('🚀 JL BEAUTY LOGIN - PRODUCTION FINAL');
        console.log('='.repeat(60));

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('password-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.classList.remove('fa-eye');
                passwordIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordIcon.classList.remove('fa-eye-slash');
                passwordIcon.classList.add('fa-eye');
            }
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
            
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 5000);
        }

        // Show loading
        function showLoading(show) {
            const loading = document.getElementById('loading');
            const form = document.getElementById('login-form');
            const submitBtn = document.getElementById('submit-btn');
            
            if (show) {
                loading.classList.remove('hidden');
                form.classList.add('hidden');
                submitBtn.disabled = true;
            } else {
                loading.classList.add('hidden');
                form.classList.remove('hidden');
                submitBtn.disabled = false;
            }
        }

        // Handle form submission
        const loginForm = document.getElementById('login-form');
        
        if (!loginForm) {
            console.error('❌ LOGIN FORM NOT FOUND!');
        } else {
            console.log('✅ Login form found, attaching handler...');
            
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                console.log('🚀 FORM SUBMITTED!');
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                console.log('📧 Email:', email);
                console.log('🔑 Password length:', password.length);
                
                // Validation
                if (!email || !password) {
                    showError('Veuillez remplir tous les champs');
                    return;
                }
                
                showLoading(true);
                
                try {
                    // Vérifier que AuthSupabase est chargé
                    if (typeof AuthSupabase === 'undefined') {
                        console.error('❌ AuthSupabase not loaded!');
                        showError('Erreur de configuration. Veuillez rafraîchir la page.');
                        showLoading(false);
                        return;
                    }
                    
                    console.log('🔐 Calling AuthSupabase.login()...');
                    
                    // Tenter la connexion
                    const result = await AuthSupabase.login(email, password);
                    
                    console.log('📊 Login result:', result);
                    
                    if (result.success) {
                        console.log('✅ LOGIN SUCCESS! Redirecting...');
                        console.log('👤 User:', result.user);
                        
                        // Petit délai pour s'assurer que tout est sauvegardé
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 500);
                    } else {
                        console.error('❌ LOGIN FAILED:', result.error);
                        showError(result.error || 'Erreur de connexion');
                        showLoading(false);
                    }
                } catch (error) {
                    console.error('💥 Login exception:', error);
                    console.error('Stack:', error.stack);
                    showError('Erreur technique. Vérifiez votre connexion.');
                    showLoading(false);
                }
            });
            
            console.log('✅ Event listener attached');
        }
        
        console.log('='.repeat(60));
        console.log('✅ LOGIN PAGE READY');
        console.log('='.repeat(60));
    </script>
</body>
</html>
